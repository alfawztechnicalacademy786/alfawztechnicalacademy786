<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al Fawz Technical Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Poppins',sans-serif;
}

/* NAVBAR */
nav {
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
box-sizing:border-box;
z-index:1000;
}

.logo {
color:white;
font-size:15px;
font-weight:600;
}

/* RIGHT SIDE */
.right {
display:flex;
align-items:center;
gap:15px;
}

.right a {
color:white;
text-decoration:none;
font-size:14px;
}

/* MENU BUTTON FIX */
.menu-btn {
font-size:22px;
color:white;
cursor:pointer;
padding:5px 10px;
margin-right:10px; /* 👈 IMPORTANT FIX */
}

/* RIGHT SIDE SLIDE MENU */
.side-menu {
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:#111;
padding-top:60px;
transition:0.3s;
z-index:2000;
}

.side-menu a {
display:block;
color:white;
padding:15px;
text-decoration:none;
border-bottom:1px solid #333;
}

.side-menu a:hover {
background:#222;
}

/* HERO */
.hero {
position:relative;
height:100vh;
overflow:hidden;
}

.hero video {
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.overlay {
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content {
position:relative;
color:white;
text-align:center;
top:50%;
transform:translateY(-50%);
}

.hero-content h1 {
font-size:34px;
}

.btn {
padding:10px 20px;
margin:10px;
border:none;
border-radius:25px;
cursor:pointer;
}

.blue {background:#007bff;color:white}
.green {background:#28a745;color:white}

/* SECTION */
.section {
padding:60px 20px;
text-align:center;
}

.cards {
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card {
background:white;
padding:20px;
margin:10px;
width:250px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* FOOTER */
footer {
background:#111;
color:white;
text-align:center;
padding:15px;
}
</style>
</head>

<body>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
<a href="#">Home</a>
<a href="courses.html">Courses</a>
<a href="verify.html">Verify</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>

<!-- NAVBAR -->
<nav>

<div class="logo">Al Fawz Technical Academy</div>

<div class="right">
<a href="verify.html">Verify</a>
<a href="#">Contact</a>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

</nav>

<!-- HERO -->
<div class="hero">

<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero-content">
<h1>Build Your Future With Skills</h1>
<p>Professional IT Courses & Certification</p>

<a href="courses.html"><button class="btn blue">Courses</button></a>
<a href="verify.html"><button class="btn green">Verify</button></a>
</div>

</div>

<!-- COURSES -->
<div class="section">
<h2>Our Courses</h2>

<div class="cards">
<div class="card"><h3>Web Development</h3></div>
<div class="card"><h3>Graphic Design</h3></div>
<div class="card"><h3>Freelancing</h3></div>
</div>

</div>

<footer>
© 2026 Al Fawz Technical Academy
</footer>

<script>
function toggleMenu(){
let menu = document.getElementById("menu");

if(menu.style.right === "0px"){
menu.style.right = "-260px";
}else{
menu.style.right = "0px";
}
}
</script>

</body>
</html>
