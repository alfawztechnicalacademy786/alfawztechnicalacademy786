<title>Al Fawz Technical Academy</title>

<style>
body {margin:0;font-family:Segoe UI;background:#f4f7fa}

/* NAV */
nav {
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.6);
color:white;
display:flex;
justify-content:space-between;
padding:15px 30px;
z-index:1000;
}
nav a {color:white;margin:10px;text-decoration:none}

/* HERO WITH VIDEO */
.hero {
position:relative;
height:100vh;
overflow:hidden;
}

/* VIDEO BACKGROUND */
.hero video {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* DARK OVERLAY */
.overlay {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

/* CONTENT */
.hero-content {
position:relative;
z-index:1;
color:white;
text-align:center;
top:50%;
transform:translateY(-50%);
padding:20px;
}

.hero-content h1 {font-size:42px}
.hero-content p {font-size:18px}

/* BUTTONS */
.btn {
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}
.blue {background:#007bff;color:white}
.green {background:#28a745;color:white}

/* SECTION */
.section {
padding:60px 20px;
text-align:center;
}

/* CARDS */
.cards {
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card {
background:white;
padding:20px;
margin:15px;
width:250px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
transition:0.3s;
}
.card:hover {transform:scale(1.05)}

/* FOOTER */
footer {
background:#0d1b2a;
color:white;
text-align:center;
padding:20px;
}
</style>

</head>

<body>

<nav>

</div>
</nav>

<!-- HERO VIDEO -->

<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero-content">
<h1>Build Your Future With Skills</h1>
<p>Professional IT Courses & Certificate Verification</p>

<a href="courses.html"><button class="btn blue">View Courses</button></a>
<a href="verify.html"><button class="btn green">Verify Certificate</button></a>
</div>

</div>

<!-- COURSES -->
<div class="section">
<h2>Our Courses</h2>

<div class="cards">

<a href="courses.html">
<div class="card">
<h3>Web Development</h3>
<p>HTML, CSS, JavaScript</p>
</div>
</a>

<a href="courses.html">
<div class="card">

<p>Photoshop & Canva</p>
</div>
</a>

<a href="courses.html">
<div class="card">
<h3>Freelancing</h3>
<p>Earn Online Skills</p>
</div>
</a>

</div>
</div>

<footer>
© 2026 Al Fawz Technical Academy
</footer>

</body>
</html>
