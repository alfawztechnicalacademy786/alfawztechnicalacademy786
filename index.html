<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al Fawz Technical Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Poppins',sans-serif;
}

/* NAVBAR */
nav {
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.75);
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
z-index:1000;
}

.logo {
color:white;
font-size:16px;
font-weight:600;
white-space:nowrap;
}

.menu {
display:flex;
gap:12px;
}

.menu a {
color:white;
text-decoration:none;
font-size:14px;
}

/* HERO */
.hero {
position:relative;
height:100vh;
overflow:hidden;
}

.hero video {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.overlay {
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content {
position:relative;
color:white;
text-align:center;
top:50%;
transform:translateY(-50%);
padding:20px;
}

.hero-content h1 {
font-size:38px;
margin-bottom:10px;
}

.hero-content p {
font-size:16px;
margin-bottom:20px;
}

/* BUTTONS */
.btn {
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
cursor:pointer;
font-size:14px;
}

.blue {background:#007bff;color:white}
.green {background:#28a745;color:white}

/* SECTION */
.section {
padding:60px 20px;
text-align:center;
}

.cards {
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card {
background:white;
padding:20px;
margin:10px;
width:250px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* FOOTER */
footer {
background:#111;
color:white;
text-align:center;
padding:15px;
}

/* MOBILE FIX */
@media(max-width:768px){
.menu {
flex-wrap:wrap;
justify-content:center;
}
}
</style>
</head>

<body>

<nav>
<div class="logo">Al Fawz</div>

<div class="menu">
<a href="#">Home</a>
<a href="courses.html">Courses</a>
<a href="verify.html">Verify</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</nav>

<div class="hero">

<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero-content">
<h1>Build Your Future With Skills</h1>
<p>Professional IT Courses & Certification</p>

<a href="courses.html"><button class="btn blue">View Courses</button></a>
<a href="verify.html"><button class="btn green">Verify Certificate</button></a>
</div>

</div>

<div class="section">
<h2>Our Courses</h2>

<div class="cards">
<div class="card"><h3>Web Development</h3></div>
<div class="card"><h3>Graphic Design</h3></div>
<div class="card"><h3>Freelancing</h3></div>
</div>

</div>

<footer>
© 2026 Al Fawz Technical Academy
</footer>

</body>
</html>
