<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al Fawz Technical Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Poppins',sans-serif;
}

/* NAVBAR */
nav {
position:fixed;
top:0;
width:100%;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
z-index:1000;
}

.logo {
color:white;
font-size:16px;
font-weight:bold;
}

/* MENU BUTTON */
.menu-btn {
display:none;
font-size:22px;
color:white;
cursor:pointer;
}

/* MENU */
.menu {
display:flex;
gap:10px;
}

.menu a {
color:white;
text-decoration:none;
font-size:14px;
padding:5px 8px;
}

/* MOBILE MENU */
@media(max-width:768px){
.menu {
display:none;
flex-direction:column;
background:#111;
position:absolute;
top:50px;
left:0;
width:100%;
}

.menu.show {
display:flex;
}

.menu-btn {
display:block;
}
}

/* HERO */
.hero {
height:100vh;
background:linear-gradient(135deg,#1d2671,#c33764);
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

button {
padding:10px 20px;
margin:10px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
<div class="logo">🎓 Al Fawz</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Home</a>
<a href="courses.html">Courses</a>
<a href="verify.html">Verify</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</nav>

<div class="hero">
<div>
<h1>All Tabs Now Visible</h1>
<p>Professional Navbar Fixed</p>

<button>Courses</button>
<button>Verify</button>
</div>
</div>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
