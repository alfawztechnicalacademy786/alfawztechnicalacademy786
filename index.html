<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al Fawz Technical Academy</title>

<style>

body {margin:0;font-family:Arial}

/* NAVBAR */
nav {
position:fixed;
top:0;
width:100%;
background:black;
color:white;
display:flex;
justify-content:space-between;
padding:10px;
z-index:1000;
}

nav a {
color:white;
margin:10px;
text-decoration:none;
}

/* HERO */
.hero {
position:relative;
height:100vh;
overflow:hidden;
}

.hero video {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.overlay {
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content {
position:relative;
color:white;
text-align:center;
top:50%;
transform:translateY(-50%);
}

button {
padding:10px 20px;
margin:10px;
border:none;
background:blue;
color:white;
border-radius:5px;
}

/* SECTION */
.section {
padding:60px;
text-align:center;
}

/* CARD */
.card {
background:white;
padding:20px;
margin:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:inline-block;
}

</style>

</head>

<body>

<nav>
<div>Al Fawz Academy</div>
<div>
<a href="#">Home</a>
<a href="courses.html">Courses</a>
<a href="verify.html">Verify</a>
</div>
</nav>

<div class="hero">

<video autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero-content">
<h1>Build Your Future With Skills</h1>
<p>Professional IT Courses</p>

<a href="courses.html"><button>Courses</button></a>
<a href="verify.html"><button>Verify</button></a>
</div>

</div>

<div class="section">

<h2>Courses</h2>

<div class="card">
<h3>Web Development</h3>
<p>Learn Coding</p>
</div>

<div class="card">
<h3>Graphic Design</h3>
<p>Learn Designing</p>
</div>

</div>

</body>
</html>
