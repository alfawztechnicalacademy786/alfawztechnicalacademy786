<!DOCTYPE html>
<html>

<head>
  <title>Verify Certificate</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
    }

    h1 {
      color: black;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .result-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .success {
      background: #d4edda;
      color: #155724;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDmVNzV2w4zA5N-DzJm7Y3ffW9J2T3W0Vw",
      authDomain: "al-fawz-technical-academy.firebaseapp.com",
      projectId: "al-fawz-technical-academy",
      storageBucket: "al-fawz-technical-academy.firebasestorage.app",
      messagingSenderId: "490782662778",
      appId: "1:490782662778:web:950f94305631c9602d5bc3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function verify() {
      var roll = document.getElementById("roll").value;
      const resultBox = document.getElementById("result");

      const doc = await db.collection("students").doc(roll).get();

      resultBox.style.display = "block";

      if (doc.exists) {
        const data = doc.data();
        resultBox.className = "result-box success";
        resultBox.innerHTML = `
          <strong>✅ Verified</strong><br><br>
          Name: ${data.name} <br>
          Marks: ${data.marks}
        `;
      } else {
        resultBox.className = "result-box error";
        resultBox.innerHTML = "❌ No Record Found";
      }
    }
  </script>

</head>

<body>

<div class="container">
  <h1>Verify Certificate</h1>

  <input type="text" id="roll" placeholder="Enter Roll Number">
  <button onclick="verify()">Verify</button>

  <div id="result" class="result-box"></div>
</div>

</body>

</html>
