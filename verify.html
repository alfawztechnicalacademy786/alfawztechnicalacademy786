<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Certificate</title>

<style>
body{
font-family:sans-serif;
background:#f4f7fa;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:25px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<div class="box">

<h2>Verify Certificate</h2>

<input type="text" id="roll" placeholder="Enter Roll Number">

<button onclick="verify()">Verify</button>

<div class="result" id="result"></div>

</div>

<script>
function verify(){

let roll = document.getElementById("roll").value;

let data = [
{roll:"1001", name:"Ali Raza", father:"Ahmed Raza", course:"Graphic Design", marks:"18/20"},
{roll:"1002", name:"Usman", father:"Khalid", course:"Web Dev", marks:"15/20"}
];

let result = data.find(d => d.roll === roll);

if(result){
document.getElementById("result").innerHTML =
"<b>Name:</b> "+result.name+"<br>"+
"<b>Father Name:</b> "+result.father+"<br>"+
"<b>Course:</b> "+result.course+"<br>"+
"<b>Marks:</b> "+result.marks;
}else{
document.getElementById("result").innerHTML = "Record not found";
}

}
</script>

</body>
</html>
