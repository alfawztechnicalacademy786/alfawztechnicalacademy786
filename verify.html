<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<style>

/* BACKGROUND */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* MAIN WRAPPER */
.wrapper{
width:90%;
max-width:900px;
}

/* HEADER */
.header{
color:white;
text-align:center;
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:28px;
}

.header p{
margin:5px 0;
opacity:0.8;
}

/* MAIN CARD */
.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
color:white;
text-align:center;
}

/* INPUT */
input{
width:70%;
padding:12px;
border-radius:8px;
border:none;
margin-bottom:10px;
outline:none;
}

button{
padding:12px 30px;
background:#00c9ff;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#0099cc;
}

/* RESULT CARD */
.result{
margin-top:25px;
padding:25px;
border-radius:15px;
background:white;
color:black;
display:none;
position:relative;
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* VERIFIED RIBBON */
.ribbon{
position:absolute;
top:0;
left:0;
background:#28a745;
color:white;
padding:8px 20px;
border-bottom-right-radius:10px;
font-size:14px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td{
padding:14px;
border-bottom:1px solid #eee;
}

.label{
font-weight:bold;
color:#555;
width:40%;
}

.value{
color:#000;
}

/* STAMP (corner style) */
.stamp{
position:absolute;
bottom:15px;
right:15px;
}

.stamp img{
width:140px;
opacity:0.85;
transform:rotate(-15deg);
}

/* ERROR */
.error{
margin-top:20px;
color:#ff4d4d;
display:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="header">
<h1>Al Fawz Technical Academy</h1>
<p>Certificate Verification System</p>
</div>

<div class="container">

<input type="text" id="roll" placeholder="Enter Roll Number">
<br>
<button onclick="verify()">Verify</button>

<div class="result" id="resultBox">

<div class="ribbon">VERIFIED</div>

<table>
<tr><td class="label">Student Name</td><td id="name"></td></tr>
<tr><td class="label">Father Name</td><td id="father"></td></tr>
<tr><td class="label">Course</td><td id="course"></td></tr>
<tr><td class="label">Marks</td><td id="marks"></td></tr>
<tr><td class="label">Batch</td><td id="batch"></td></tr>
<tr><td class="label">Duration</td><td id="duration"></td></tr>
</table>
<br><br>
<a id="certBtn" href="#" target="_blank">
<button style="padding:10px 20px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;">
Download Certificate
</button>
</a>

<div class="stamp">
<img src="stamp.png">
</div>

</div>

<div class="error" id="error">❌ Record Not Found</div>

</div>

</div>

<script>

function verify(){

let roll = document.getElementById("roll").value;

fetch("https://script.google.com/macros/s/AKfycbzT37zdrF_FARcNI2Pdp7NMbXWTa9BuKK9HmSt-zO9YSrrsmgp1aajjgl4SAi2PnS0Zyg/exec")

.then(res => res.json())
.then(data => {

let student = data.find(s => s.id == roll || s.id == roll.trim());

if(student){

document.getElementById("resultBox").style.display="block";
document.getElementById("error").style.display="none";

/* MARKS FIX */
let marks = student.marks;
if(marks <= 1){
marks = (marks * 100).toFixed(0) + "%";
}

document.getElementById("name").innerText = student.name;
document.getElementById("father").innerText = student.father;
document.getElementById("course").innerText = student.course;
document.getElementById("marks").innerText = marks;
document.getElementById("batch").innerText = student.batch;
document.getElementById("duration").innerText = student.duration;
if(student.certificate && student.certificate !== ""){
  document.getElementById("certBtn").href = student.certificate;
  document.getElementById("certBtn").style.display = "inline-block";
}else{
  document.getElementById("certBtn").style.display = "none";
}

}else{

document.getElementById("resultBox").style.display="none";
document.getElementById("error").style.display="block";

}

});

}

</script>

</body>
</html>
