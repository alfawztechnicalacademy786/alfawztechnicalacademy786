<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Certificate</title>

<style>
body{
font-family:'Poppins',sans-serif;
background:#f4f7fa;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:25px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
padding:15px;
border-radius:10px;
background:#eafaf1;
display:none;
}

.fail{
background:#ffe6e6;
}

.stamp{
margin-top:15px;
font-size:22px;
font-weight:bold;
color:green;
border:2px solid green;
display:inline-block;
padding:8px 20px;
border-radius:50px;
}

</style>
</head>

<body>

<div class="box">

<h2>Verify Certificate</h2>

<input type="text" id="roll" placeholder="Enter Roll Number">

<button onclick="verify()">Verify</button>

<div class="result" id="result"></div>

</div>

<script>

function verify(){

let roll = document.getElementById("roll").value;

fetch("https://script.google.com/macros/s/AKfycbzT37zdrF_FARcNI2Pdp7NMbXWTa9BuKK9HmSt-zO9YSrrsmgp1aajjgl4SAi2PnS0Zyg/exec")

.then(res => res.json())
.then(data => {

let student = data.find(s => s.id == roll);

let resultBox = document.getElementById("result");

if(student){

resultBox.style.display = "block";
resultBox.classList.remove("fail");

resultBox.innerHTML = `
<b>Name:</b> ${student.name}<br>
<b>Father Name:</b> ${student.father}<br>
<b>Course:</b> ${student.course}<br>
<b>Marks:</b> ${student.marks}<br>
<b>Batch:</b> ${student.batch}<br>
<b>Duration:</b> ${student.duration}<br>

<div class="stamp">✔ CERTIFIED</div>
`;

}else{

resultBox.style.display = "block";
resultBox.classList.add("fail");

resultBox.innerHTML = "❌ Record Not Found";

}

});

}

</script>

</body>
</html>
