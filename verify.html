<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>
<style>
/* BACKGROUND */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

/* MAIN WRAPPER */
.wrapper{
width:100%;
max-width:950px;
}

/* HEADER */
.header{
color:white;
text-align:center;
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:32px;
font-weight:bold;
}

.header p{
margin-top:8px;
opacity:0.85;
font-size:16px;
}

/* MAIN CARD */
.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:35px;
border-radius:22px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
color:white;
text-align:center;
}

/* INPUT */
input{
width:75%;
padding:14px;
border-radius:10px;
border:none;
margin-bottom:15px;
outline:none;
font-size:16px;
color: #333;
}

/* BUTTON */
.verify-btn{
padding:13px 35px;
background:linear-gradient(135deg,#00c9ff,#007bff);
border:none;
color:white;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:600;
transition:0.3s;
}

.verify-btn:hover{
transform:translateY(-2px);
opacity:0.9;
}

/* RESULT CARD */
.result{
margin-top:30px;
padding:30px;
border-radius:20px;
background:white;
color:black;
display:none;
position:relative;
animation:fade 0.5s ease;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
overflow:hidden;
}

@keyframes fade{
from{ opacity:0; transform:translateY(20px); }
to{ opacity:1; transform:translateY(0); }
}

/* VERIFIED RIBBON */
.ribbon{
position:absolute;
top:0;
left:0;
background:#28a745;
color:white;
padding:10px 22px;
border-bottom-right-radius:12px;
font-size:14px;
font-weight:bold;
letter-spacing:1px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
padding:16px;
border-bottom:1px solid #e5e5e5;
font-size:15px;
text-align: left;
}

.label{
font-weight:bold;
color:#555;
width:40%;
background:#f7f7f7;
}

.value{
color:#111;
font-weight:500;
}

/* DOWNLOAD BUTTON */
.download-btn{
display: inline-block;
margin-top:25px;
padding:14px 30px;
background:linear-gradient(135deg,#007bff,#0056b3);
color:white !important;
text-decoration: none;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
border: none;
}

.download-btn:hover{
transform:translateY(-3px);
box-shadow: 0 5px 15px rgba(0,123,255,0.4);
}

/* STAMP */
.stamp{
position:absolute;
bottom:15px;
right:15px;
}

.stamp img{
width:120px;
opacity:0.8;
transform:rotate(-15deg);
}

/* ERROR */
.error{
margin-top:20px;
color:#ff4d4d;
display:none;
font-weight:bold;
font-size:16px;
}

/* MOBILE */
@media(max-width:768px){
input{ width:100%; }
.header h1{ font-size:24px; }
.container{ padding:20px; }
td{ font-size:13px; padding:12px; }
.stamp img{ width:100px; }
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>Al Fawz Technical Academy</h1>
        <p>Professional Certificate Verification System</p>
    </div>

    <div class="container">
        <input type="text" id="roll" placeholder="Enter Roll Number">
        <br>
        <button class="verify-btn" onclick="verify()" id="mainVerifyBtn">
            Verify Certificate
        </button>

        <div class="result" id="resultBox">
            <div class="ribbon">VERIFIED</div>
            <table>
                <tr>
                    <td class="label">Student Name</td>
                    <td class="value" id="name"></td>
                </tr>
                <tr>
                    <td class="label">Father Name</td>
                    <td class="value" id="father"></td>
                </tr>
                <tr>
                    <td class="label">Course</td>
                    <td class="value" id="course"></td>
                </tr>
                <tr>
                    <td class="label">Marks</td>
                    <td class="value" id="marks"></td>
                </tr>
                <tr>
                    <td class="label">Batch</td>
                    <td class="value" id="batch"></td>
                </tr>
                <tr>
                    <td class="label">Duration</td>
                    <td class="value" id="duration"></td>
                </tr>
            </table>

            <a id="certBtn" href="#" target="_blank" class="download-btn">
                Download Certificate
            </a>

            <div class="stamp">
                <img src="stamp.png" alt="Stamp">
            </div>
        </div>

        <div class="error" id="error">
            ❌ Record Not Found
        </div>
    </div>
</div>

<script>
function verify(){
    let roll = document.getElementById("roll").value.trim();
    let verifyBtn = document.getElementById("mainVerifyBtn");
    
    if(roll === "") {
        alert("Please enter a roll number");
        return;
    }

    // Button loading state
    verifyBtn.innerText = "Verifying...";
    verifyBtn.disabled = true;

    fetch("https://script.google.com/macros/s/AKfycbzT37zdrF_FARcNI2Pdp7NMbXWTa9BuKK9HmSt-zO9YSrrsmgp1aajjgl4SAi2PnS0Zyg/exec?id="+roll)
    .then(res => res.json())
    .then(student => {
        verifyBtn.innerText = "Verify Certificate";
        verifyBtn.disabled = false;

        if(student.status === "verified"){
            document.getElementById("resultBox").style.display = "block";
            document.getElementById("error").style.display = "none";

            /* MARKS FIX */
            let marks = student.marks;
            if(marks <= 1 && marks > 0){
                marks = (marks * 100).toFixed(0) + "%";
            }

            document.getElementById("name").innerText = student.name;
            document.getElementById("father").innerText = student.father_name;
            document.getElementById("course").innerText = student.course;
            document.getElementById("marks").innerText = marks;
            document.getElementById("batch").innerText = student.batch;
            document.getElementById("duration").innerText = student.duration;

            /* CERTIFICATE LINK FIX */
let downloadLink = document.getElementById("certBtn");

// Test karne ke liye main console mein link print kar raha hoon
console.log("Received Link:", student.certificate);

if(student.certificate && student.certificate !== "#" && student.certificate !== ""){
    downloadLink.href = student.certificate;
    downloadLink.style.display = "inline-block"; // Button dikhao
} else {
    // Agar link nahi mil raha toh temporary button dikhao taake humein pata chale
    downloadLink.href = "#";
    downloadLink.innerText = "Link Not Found in Sheet";
    downloadLink.style.display = "inline-block";
    downloadLink.style.background = "red";
}
    })
    .catch(err => {
        console.error("Error:", err);
        verifyBtn.innerText = "Verify Certificate";
        verifyBtn.disabled = false;
        alert("Something went wrong. Please try again.");
    });
}
</script>

</body>
</html>
