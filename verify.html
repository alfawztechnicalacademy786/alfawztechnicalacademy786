<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

header {
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.container {
  max-width:650px;
  margin:40px auto;
  background:white;
  color:black;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input {
  padding:12px;
  width:85%;
  margin:10px;
  border-radius:8px;
}

button {
  padding:12px 25px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.result-box {
  margin-top:25px;
  padding:20px;
  border-radius:10px;
}

.verified {
  background:#e6ffed;
  border-left:6px solid #28a745;
}

.notfound {
  background:#ffe6e6;
  border-left:6px solid red;
}

table {
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}

td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

.label {
  font-weight:bold;
  width:40%;
}

.stamp {
  width:120px;
  margin:10px auto;
  display:block;
}
</style>

</head>

<body>

<header>
🎓 Al Fawz Technical Academy
</header>

<div class="container">

<h2>Verify Certificate</h2>

<input type="text" id="roll" placeholder="Enter Roll No (FA-1234)">
<br>
<button onclick="verify()">Verify</button>

<div id="result"></div>

</div>

<script>
function verify() {

let id = document.getElementById("roll").value.trim();

fetch("https://script.google.com/macros/s/AKfycbwFozPXBsUOD2L4lpljJlKERQGJ0mPtkjV-wKdzTvFWeq1P675f0LmRmkI3u1dKk-coJw/exec?id=" + id)
.then(res => res.json())
.then(data => {

if (data.status === "verified") {

let marks = data.marks;
if(!marks.includes("%")){
  marks = (parseFloat(marks) * 100) + "%";
}

document.getElementById("result").innerHTML =
`
<div class="result-box verified">

<img src="stamp.png" class="stamp">

<h3>✅ Certificate Verified</h3>

<table>
<tr><td class="label">Name</td><td>${data.name}</td></tr>
<tr><td class="label">Course</td><td>${data.course}</td></tr>
<tr><td class="label">Marks</td><td>${marks}</td></tr>
<tr><td class="label">Batch</td><td>${data.batch}</td></tr>
<tr><td class="label">Duration</td><td>${data.duration}</td></tr>
</table>

</div>
`;

} else {

document.getElementById("result").innerHTML =
`
<div class="result-box notfound">
❌ Record Not Found
</div>
`;

}

});
}
</script>

</body>
</html>
