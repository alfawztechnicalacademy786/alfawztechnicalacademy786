<!DOCTYPE html>
<html>

<head>
  <title>Verify Certificate</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<h1>Verify Your Certificate</h1>

<input type="text" id="roll" placeholder="Enter Roll Number">
<br><br>
<button onclick="verify()">Verify</button>

<div id="result"></div>

<script>
function verify() {
  var roll = document.getElementById("roll").value;

  if (roll == "1234") {
    document.getElementById("result").innerHTML =
      "✅ Certificate Verified - Student: Ali - Marks: 85%";
  } else {
    document.getElementById("result").innerHTML =
      "❌ No Record Found";
  }
}
</script>

</body>

</html>
