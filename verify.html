<!DOCTYPE html>
<html>

<head>
  <title>Verify Certificate</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.15);
      padding: 30px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0px 10px 40px rgba(0,0,0,0.3);
      color: white;
      position: relative;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      display: none;
      position: relative;
    }

    .success {
      background: linear-gradient(to right, #00b09b, #96c93d);
    }

    .error {
      background: linear-gradient(to right, #ff416c, #ff4b2b);
      text-align: center;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
      background: white;
      color: black;
      border-radius: 10px;
      overflow: hidden;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    td:first-child {
      font-weight: bold;
      background: #f5f5f5;
      width: 40%;
    }

    .verified-title {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }

  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDmVNzV2w4zA5N-DzJm7Y3ffW9J2T3W0Vw",
      authDomain: "al-fawz-technical-academy.firebaseapp.com",
      projectId: "al-fawz-technical-academy",
      storageBucket: "al-fawz-technical-academy.firebasestorage.app",
      messagingSenderId: "490782662778",
      appId: "1:490782662778:web:950f94305631c9602d5bc3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function verify() {
      var roll = document.getElementById("roll").value;
      const resultBox = document.getElementById("result");

      const doc = await db.collection("students").doc(roll).get();

      resultBox.style.display = "block";

      if (doc.exists) {
        const data = doc.data();
        resultBox.className = "result-box success";

        resultBox.innerHTML = `
          
          <!-- PROFESSIONAL SVG STAMP -->
          <div style="position:absolute; top:-30px; right:-30px;">
            <svg width="110" height="110" viewBox="0 0 200 200">
              <defs>
                <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FFD700"/>
                  <stop offset="100%" stop-color="#FFA500"/>
                </linearGradient>
              </defs>

              <circle cx="100" cy="100" r="90" fill="url(#gold)" stroke="#b8860b" stroke-width="4"/>
              <circle cx="100" cy="100" r="65" fill="none" stroke="#b8860b" stroke-width="3"/>

              <text x="100" y="105" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">
                VERIFIED
              </text>

              <text x="100" y="70" text-anchor="middle" font-size="18">★ ★ ★</text>
              <text x="100" y="140" text-anchor="middle" font-size="18">★ ★ ★</text>
            </svg>
          </div>

          <div class="verified-title">✔ Certificate Verified</div>

          <table>
            <tr><td>Name</td><td>${data.name}</td></tr>
            <tr><td>Marks</td><td>${data.marks}</td></tr>
            <tr><td>Course</td><td>${data.course}</td></tr>
            <tr><td>Batch</td><td>${data.batch}</td></tr>
            <tr><td>Duration</td><td>${data.duration}</td></tr>
          </table>
        `;
      } else {
        resultBox.className = "result-box error";
        resultBox.innerHTML = "❌ No Record Found";
      }
    }
  </script>

</head>

<body>

<div class="container">
  <h1>🔍 Verify Certificate</h1>

  <input type="text" id="roll" placeholder="Enter Roll Number">
  <button onclick="verify()">Verify Now</button>

  <div id="result" class="result-box"></div>
</div>

</body>

</html>
