<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification | Al Fawz Technical Academy</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1d2671,#c33764);
  color:white;
}

header {
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  letter-spacing:1px;
}

.container {
  max-width:600px;
  margin:50px auto;
  background:white;
  color:black;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input {
  padding:12px;
  width:85%;
  margin:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button {
  padding:12px 30px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

button:hover {
  background:#218838;
}

.result {
  margin-top:25px;
  text-align:left;
}

.verified {
  background:#d4edda;
  padding:20px;
  border-radius:10px;
  border-left:6px solid #28a745;
}

.notfound {
  background:#f8d7da;
  padding:20px;
  border-radius:10px;
  border-left:6px solid #dc3545;
}
</style>

</head>

<body>

<header>
🎓 Al Fawz Technical Academy - Certificate Verification
</header>

<div class="container">

<h2>Verify Your Certificate</h2>

<input type="text" id="roll" placeholder="Enter Roll No (e.g. FA-1234)">
<br>
<button onclick="verify()">Verify</button>

<div id="result" class="result"></div>

</div>

<script>
function verify() {

let id = document.getElementById("roll").value.trim();

if(!id){
  alert("Please enter Roll Number");
  return;
}

fetch("https://script.google.com/macros/s/AKfycbwFozPXBsUOD2L4lpljJlKERQGJ0mPtkjV-wKdzTvFWeq1P675f0LmRmkI3u1dKk-coJw/exec?id=" + id)
.then(res => res.json())
.then(data => {

if (data.status === "verified") {

document.getElementById("result").innerHTML =
`
<div class="verified">
<h3>✅ Certificate Verified</h3>
<p><b>Name:</b> ${data.name}</p>
<p><b>Course:</b> ${data.course}</p>
<p><b>Marks:</b> ${data.marks}</p>
<p><b>Batch:</b> ${data.batch}</p>
<p><b>Duration:</b> ${data.duration}</p>
</div>
`;

} else {

document.getElementById("result").innerHTML =
`
<div class="notfound">
❌ Record Not Found
</div>
`;

}

})
.catch(() => {
document.getElementById("result").innerHTML =
`
<div class="notfound">
⚠️ Error fetching data
</div>
`;
});

}
</script>

</body>
</html>
