<!DOCTYPE html>
<html>

<head>
  <title>Verify Certificate</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.15);
      padding: 30px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0px 10px 40px rgba(0,0,0,0.3);
      color: white;
      position: relative;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      display: none;
      position: relative;
      overflow: hidden;
    }

    .success {
      background: linear-gradient(to right, #00b09b, #96c93d);
    }

    .error {
      background: linear-gradient(to right, #ff416c, #ff4b2b);
      text-align: center;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
      background: white;
      color: black;
      border-radius: 10px;
      overflow: hidden;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    td:first-child {
      font-weight: bold;
      background: #f5f5f5;
      width: 40%;
    }

    .verified-title {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }

    /* 🔥 ANIMATED STAMP */
    .stamp {
      position: absolute;
      top: -35px;
      right: -35px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #FFD700, #FFA500);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #333;
      transform: rotate(-20deg) scale(0);
      animation: popIn 0.6s ease forwards;
      box-shadow: 0 0 20px rgba(255,215,0,0.8), 
                  0 5px 15px rgba(0,0,0,0.4);
    }

    .stamp::after {
      content: "VERIFIED";
      font-size: 14px;
    }

    @keyframes popIn {
      0% {
        transform: rotate(-20deg) scale(0);
        opacity: 0;
      }
      70% {
        transform: rotate(-20deg) scale(1.2);
      }
      100% {
        transform: rotate(-20deg) scale(1);
        opacity: 1;
      }
    }

    /* Shine effect */
    .stamp::before {
      content: "";
      position: absolute;
      width: 150%;
      height: 40%;
      background: rgba(255,255,255,0.4);
      top: -20%;
      left: -25%;
      transform: rotate(25deg);
      animation: shine 2s infinite;
    }

    @keyframes shine {
      0% { left: -50%; }
      100% { left: 100%; }
    }

  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDmVNzV2w4zA5N-DzJm7Y3ffW9J2T3W0Vw",
      authDomain: "al-fawz-technical-academy.firebaseapp.com",
      projectId: "al-fawz-technical-academy",
      storageBucket: "al-fawz-technical-academy.firebasestorage.app",
      messagingSenderId: "490782662778",
      appId: "1:490782662778:web:950f94305631c9602d5bc3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function verify() {
      var roll = document.getElementById("roll").value;
      const resultBox = document.getElementById("result");

      const doc = await db.collection("students").doc(roll).get();

      resultBox.style.display = "block";

      if (doc.exists) {
        const data = doc.data();
        resultBox.className = "result-box success";

        resultBox.innerHTML = `
          <div class="stamp"></div>

          <div class="verified-title">✔ Certificate Verified</div>

          <table>
            <tr><td>Name</td><td>${data.name}</td></tr>
            <tr><td>Marks</td><td>${data.marks}</td></tr>
            <tr><td>Course</td><td>${data.course}</td></tr>
            <tr><td>Batch</td><td>${data.batch}</td></tr>
            <tr><td>Duration</td><td>${data.duration}</td></tr>
          </table>
        `;
      } else {
        resultBox.className = "result-box error";
        resultBox.innerHTML = "❌ No Record Found";
      }
    }
  </script>

</head>

<body>

<div class="container">
  <h1>🔍 Verify Certificate</h1>

  <input type="text" id="roll" placeholder="Enter Roll Number">
  <button onclick="verify()">Verify Now</button>

  <div id="result" class="result-box"></div>
</div>

</body>

</html>
