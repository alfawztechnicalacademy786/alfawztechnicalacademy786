<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<style>

/* BACKGROUND */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* MAIN CARD */
.container{
width:90%;
max-width:850px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
color:white;
text-align:center;
}

/* TITLE */
h2{
margin-bottom:20px;
}

/* INPUT */
input{
width:75%;
padding:12px;
border:none;
border-radius:8px;
margin-bottom:10px;
outline:none;
}

button{
padding:12px 30px;
background:#00c9ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#0099cc;
}

/* RESULT CARD */
.result{
margin-top:25px;
padding:20px;
border-radius:15px;
background:white;
color:black;
display:none;
animation:fadeIn 0.5s ease;
position:relative;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

td{
padding:14px;
border-bottom:1px solid #eee;
}

.label{
font-weight:bold;
color:#555;
width:40%;
}

.value{
color:#000;
}

/* VERIFIED BADGE */
.badge{
position:absolute;
top:15px;
right:15px;
background:#28a745;
color:white;
padding:6px 15px;
border-radius:20px;
font-size:14px;
}

/* STAMP */
.stamp{
margin-top:20px;
}

.stamp img{
width:200px;
opacity:0.85;
}

/* ERROR */
.error{
margin-top:20px;
color:#ff4d4d;
display:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Certificate Verification</h2>

<input type="text" id="roll" placeholder="Enter Roll Number">
<br>
<button onclick="verify()">Verify</button>

<!-- RESULT -->
<div class="result" id="resultBox">

<div class="badge">VERIFIED</div>

<table>
<tr><td class="label">Student Name</td><td id="name"></td></tr>
<tr><td class="label">Father Name</td><td id="father"></td></tr>
<tr><td class="label">Course</td><td id="course"></td></tr>
<tr><td class="label">Marks</td><td id="marks"></td></tr>
<tr><td class="label">Batch</td><td id="batch"></td></tr>
<tr><td class="label">Duration</td><td id="duration"></td></tr>
</table>

<div class="stamp">
<img src="stamp.png">
</div>

</div>

<div class="error" id="error">❌ Record Not Found</div>

</div>

<script>

function verify(){

let roll = document.getElementById("roll").value;

fetch("https://script.google.com/macros/s/AKfycbzT37zdrF_FARcNI2Pdp7NMbXWTa9BuKK9HmSt-zO9YSrrsmgp1aajjgl4SAi2PnS0Zyg/exec")

.then(res => res.json())
.then(data => {

let student = data.find(s => s.id == roll);

if(student){

document.getElementById("resultBox").style.display="block";
document.getElementById("error").style.display="none";

/* MARKS FIX */
let marks = student.marks;
if(marks <= 1){
marks = (marks * 100).toFixed(0) + "%";
}

document.getElementById("name").innerText = student.name;
document.getElementById("father").innerText = student.father;
document.getElementById("course").innerText = student.course;
document.getElementById("marks").innerText = marks;
document.getElementById("batch").innerText = student.batch;
document.getElementById("duration").innerText = student.duration;

}else{

document.getElementById("resultBox").style.display="none";
document.getElementById("error").style.display="block";

}

});

}

</script>

</body>
</html>
