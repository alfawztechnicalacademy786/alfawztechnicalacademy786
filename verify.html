<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Certificate</title>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
max-width:750px;
margin:50px auto;
background:white;
color:black;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
margin-bottom:20px;
}

input{
width:80%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:12px 25px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#218838;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
display:none;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

.label{
font-weight:bold;
width:40%;
}

.stamp{
margin-top:20px;
display:none;
}

.stamp img{
width:160px;
}

.error{
margin-top:20px;
color:red;
display:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Certificate Verification</h2>

<input type="text" id="roll" placeholder="Enter Roll Number">
<br>
<button onclick="verify()">Verify</button>

<table id="resultTable">
<tr><td class="label">Name:</td><td id="name"></td></tr>
<tr><td class="label">Father Name:</td><td id="father"></td></tr>
<tr><td class="label">Course:</td><td id="course"></td></tr>
<tr><td class="label">Marks:</td><td id="marks"></td></tr>
<tr><td class="label">Batch:</td><td id="batch"></td></tr>
<tr><td class="label">Duration:</td><td id="duration"></td></tr>
</table>

<div class="stamp" id="stamp">
<img src="stamp.png">
</div>

<div class="error" id="error">❌ Record Not Found</div>

</div>

<script>

function verify(){

let roll = document.getElementById("roll").value;

fetch("https://script.google.com/macros/s/AKfycbzT37zdrF_FARcNI2Pdp7NMbXWTa9BuKK9HmSt-zO9YSrrsmgp1aajjgl4SAi2PnS0Zyg/exec")

.then(res => res.json())
.then(data => {

let student = data.find(s => s.id == roll);

if(student){

document.getElementById("resultTable").style.display="table";
document.getElementById("stamp").style.display="block";
document.getElementById("error").style.display="none";

/* ✅ MARKS FIX */
let marks = student.marks;

// اگر marks 0.95 ہو تو اسے % میں convert کریں
if(marks <= 1){
marks = (marks * 100).toFixed(0) + "%";
}

document.getElementById("name").innerText = student.name;
document.getElementById("father").innerText = student.father;
document.getElementById("course").innerText = student.course;
document.getElementById("marks").innerText = marks;
document.getElementById("batch").innerText = student.batch;
document.getElementById("duration").innerText = student.duration;

}else{

document.getElementById("resultTable").style.display="none";
document.getElementById("stamp").style.display="none";
document.getElementById("error").style.display="block";

}

});

}

</script>

</body>
</html>
