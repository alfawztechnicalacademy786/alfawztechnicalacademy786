<!DOCTYPE html>
<html>

<head>
  <title>Verify Certificate</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.15);
      padding: 30px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0px 10px 40px rgba(0,0,0,0.3);
      color: white;
    }

    h1 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      display: none;
    }

    .success {
      background: linear-gradient(to right, #00b09b, #96c93d);
      color: white;
    }

    .error {
      background: linear-gradient(to right, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 15px;
    }

    .card {
      background: rgba(255,255,255,0.9);
      padding: 12px;
      border-radius: 12px;
      color: black;
      font-size: 14px;
      box-shadow: 0px 3px 10px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .full {
      grid-column: span 2;
    }

    .title {
      font-weight: bold;
      color: #333;
    }

  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDmVNzV2w4zA5N-DzJm7Y3ffW9J2T3W0Vw",
      authDomain: "al-fawz-technical-academy.firebaseapp.com",
      projectId: "al-fawz-technical-academy",
      storageBucket: "al-fawz-technical-academy.firebasestorage.app",
      messagingSenderId: "490782662778",
      appId: "1:490782662778:web:950f94305631c9602d5bc3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function verify() {
      var roll = document.getElementById("roll").value;
      const resultBox = document.getElementById("result");

      const doc = await db.collection("students").doc(roll).get();

      resultBox.style.display = "block";

      if (doc.exists) {
        const data = doc.data();
        resultBox.className = "result-box success";

        resultBox.innerHTML = `
          <h3>🎓 Certificate Verified</h3>

          <div class="grid">

            <div class="card">
              <div class="title">Name</div>
              ${data.name}
            </div>

            <div class="card">
              <div class="title">Marks</div>
              ${data.marks}
            </div>

            <div class="card">
              <div class="title">Course</div>
              ${data.course}
            </div>

            <div class="card">
              <div class="title">Batch</div>
              ${data.batch}
            </div>

            <div class="card full">
              <div class="title">Duration</div>
              ${data.duration}
            </div>

          </div>
        `;
      } else {
        resultBox.className = "result-box error";
        resultBox.innerHTML = "❌ No Record Found";
      }
    }
  </script>

</head>

<body>

<div class="container">
  <h1>🔍 Verify Certificate</h1>

  <input type="text" id="roll" placeholder="Enter Roll Number">
  <button onclick="verify()">Verify Now</button>

  <div id="result" class="result-box"></div>
</div>

</body>

</html>
