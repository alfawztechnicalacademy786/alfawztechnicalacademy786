<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* MAIN CARD */
.container{
background:white;
width:90%;
max-width:800px;
padding:30px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
text-align:center;
}

h2{
margin-bottom:20px;
}

/* INPUT */
input{
width:80%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:12px 30px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#218838;
}

/* RESULT CARD */
.result-card{
margin-top:25px;
padding:20px;
border-radius:10px;
background:linear-gradient(135deg,#f8f9fa,#e9ecef);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
position:relative;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.label{
font-weight:bold;
color:#333;
width:40%;
}

.value{
color:#000;
}

/* PASS BADGE */
.badge{
position:absolute;
top:15px;
right:15px;
background:#28a745;
color:white;
padding:6px 15px;
border-radius:20px;
font-size:14px;
}

/* STAMP */
.stamp{
margin-top:20px;
}

.stamp img{
width:180px;
opacity:0.9;
}

/* ERROR */
.error{
margin-top:20px;
color:red;
font-weight:bold;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Certificate Verification</h2>

<input type="text" id="roll" placeholder="Enter Roll Number">
<br>
<button onclick="verify()">Verify</button>

<!-- RESULT -->
<div class="result-card" id="card">

<div class="badge">VERIFIED</div>

<table>
<tr><td class="label">Student Name</td><td class="value" id="name"></td></tr>
<tr><td class="label">Father Name</td><td class="value" id="father"></td></tr>
<tr><td class="label">Course</td><td class="value" id="course"></td></tr>
<tr><td class="label">Marks</td><td class="value" id="marks"></td></tr>
<tr><td class="label">Batch</td><td class="value" id="batch"></td></tr>
<tr><td class="label">Duration</td><td class="value" id="duration"></td></tr>
</table>

<div class="stamp">
<img src="stamp.png">
</div>

</div>

<div class="error" id="error">❌ Record Not Found</div>

</div>

<script>

function verify(){

let roll = document.getElementById("roll").value;

fetch("https://script.google.com/macros/s/AKfycbzT37zdrF_FARcNI2Pdp7NMbXWTa9BuKK9HmSt-zO9YSrrsmgp1aajjgl4SAi2PnS0Zyg/exec")

.then(res => res.json())
.then(data => {

let student = data.find(s => s.id == roll);

if(student){

document.getElementById("card").style.display="block";
document.getElementById("error").style.display="none";

/* MARKS FIX */
let marks = student.marks;
if(marks <= 1){
marks = (marks * 100).toFixed(0) + "%";
}

document.getElementById("name").innerText = student.name;
document.getElementById("father").innerText = student.father;
document.getElementById("course").innerText = student.course;
document.getElementById("marks").innerText = marks;
document.getElementById("batch").innerText = student.batch;
document.getElementById("duration").innerText = student.duration;

}else{

document.getElementById("card").style.display="none";
document.getElementById("error").style.display="block";

}

});

}

</script>

</body>
</html>
